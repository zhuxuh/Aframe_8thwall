<a-entity image-target-audio="src: ../assets/my_audio.mp3; target: my-poster"></a-entity>
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>06 — Audio</title>

  <!-- AR Libraries -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>
  <script src="https://cdn.8thwall.com/web/xrextras/xrextras.js"></script>

  <!-- 8th Wall Engine -->
  <script async src="../engine/xr.js" data-preload-chunks="slam"></script>

  <!-- Image Target Configuration -->
  <script>
    const onxrloaded = () => {
      XR8.XrController.configure({
        imageTargetData:[{
          "name": "my-poster",
          "type": "PLANAR",
          "imagePath": "../assets/Targets/Target_1000055040.jpg",
          "properties": {
            "left": 0, "top": 0,
            "width": 830, "height": 830,
            "originalWidth": 830, "originalHeight": 830,
            "isRotated": false
          }
        }]
      });
    };
    window.XR8 ? onxrloaded() : window.addEventListener('xrloaded', onxrloaded);
  </script>

  <!-- Custom component: plays/pauses audio when image target is found/lost.
       Events fire on <a-scene>, so we filter by event.detail.name. -->
  <script>
    AFRAME.registerComponent('image-target-audio', {
      schema: {
        src: {type: 'string'},
        target: {type: 'string', default: 'my-poster'}
      },
      init: function () {
        this.audio = new Audio(this.data.src);
        this.audio.loop = true;

        this.onImageFound = (e) => {
          if (e.detail.name === this.data.target) {
            this.audio.play().catch(function (err) {
              console.warn('Audio play blocked:', err);
            });
          }
        };
        this.onImageLost = (e) => {
          if (e.detail.name === this.data.target) {
            this.audio.pause();
          }
        };

        this.el.sceneEl.addEventListener('xrimagefound', this.onImageFound);
        this.el.sceneEl.addEventListener('xrimagelost', this.onImageLost);
      },
      remove: function () {
        this.audio.pause();
        this.el.sceneEl.removeEventListener('xrimagefound', this.onImageFound);
        this.el.sceneEl.removeEventListener('xrimagelost', this.onImageLost);
      }
    });
  </script>
</head>
<body>
  <a-scene
    xrextras-gesture-detector
    xrextras-almost-there
    xrextras-loading
    xrextras-runtime-error
    xrweb="disableWorldTracking: true">

    <a-camera position="0 4 10"></a-camera>

    <xrextras-named-image-target name="my-poster">

      <!-- Audio component — replace src with your own audio file -->
      <a-entity image-target-audio="src: ../assets/634332__josefpres__bass-loops-077-with-drums-long-loop-120-bpm.mp3; target: my-poster"></a-entity>

      <!-- Visual speaker indicator -->
      <a-cylinder color="#333333" radius="0.15" height="0.05"
                  position="0 0.025 0"></a-cylinder>
      <a-cone color="#555555" radius-bottom="0.15" radius-top="0.05" height="0.3"
              position="0 0.2 0"></a-cone>

      <!-- Animated sound rings -->
      <a-ring color="#00AAFF" radius-inner="0.25" radius-outer="0.28"
              position="0 0.3 0" rotation="0 0 0" opacity="0.6"
              animation="property: scale; from: 1 1 1; to: 2 2 2;
                         loop: true; dur: 1500; easing: easeOutQuad"
              animation__fade="property: opacity; from: 0.6; to: 0;
                               loop: true; dur: 1500; easing: easeOutQuad">
      </a-ring>

      <a-ring color="#00AAFF" radius-inner="0.25" radius-outer="0.28"
              position="0 0.3 0" rotation="0 0 0" opacity="0.6"
              animation="property: scale; from: 1 1 1; to: 2 2 2;
                         loop: true; dur: 1500; delay: 500; easing: easeOutQuad"
              animation__fade="property: opacity; from: 0.6; to: 0;
                               loop: true; dur: 1500; delay: 500; easing: easeOutQuad">
      </a-ring>

      <a-text value="Audio Playing" color="white" align="center"
              position="0 0.8 0" width="3"></a-text>

    </xrextras-named-image-target>

  </a-scene>
</body>
</html>
